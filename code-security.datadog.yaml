# Datadog Code Security (SAST) configuration
# https://docs.datadoghq.com/security/code_security/static_analysis/configuration/
#
# Security-focused rulesets only — style/best-practice rulesets are deliberately
# omitted (eslint already covers style; security findings should stay high-signal).
schema-version: v1.0
sast:
  use-default-rulesets: false
  use-rulesets:
    - tsx-react
    - typescript-browser-security
    - typescript-common-security
    - typescript-node-security
  global-config:
    ignore-paths:
      - 'src/routeTree.gen.ts' # auto-generated by TanStack Router
      - 'docs/**'
      - 'observability/**' # dashboard/monitor JSON exports
    use-gitignore: true
    ignore-generated-files: true
