version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    mem_limit: 512m
    cpus: '0.5'
    environment:
      - NODE_ENV=production
      - DD_AGENT_HOST=datadog-agent
      - DD_SERVICE=kranz-tv
      - DD_ENV=${DD_ENV:-local}
      - DD_VERSION=${DD_VERSION:-0.0.0}

    depends_on:
      datadog-agent:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/api/channels']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  datadog-agent:
    image: datadog/agent:7
    mem_limit: 256m
    cpus: '0.25'
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=datadoghq.com
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    ports:
      - '8125:8125/udp'
      - '8126:8126'
    healthcheck:
      test: ['CMD', 'agent', 'health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
