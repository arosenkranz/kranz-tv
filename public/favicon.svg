<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- TV body -->
  <rect x="8" y="18" width="48" height="34" rx="4"
        stroke="#39ff14" stroke-width="3" fill="#050505"
        filter="url(#glow)"/>

  <!-- Screen bezel -->
  <rect x="13" y="23" width="38" height="23" rx="2"
        stroke="#39ff14" stroke-width="1.5" fill="#0a0a0a"
        filter="url(#glow)"/>

  <!-- Screen phosphor tint -->
  <rect x="14" y="24" width="36" height="21" rx="1"
        fill="#39ff1412"/>

  <!-- K on screen -->
  <text x="32" y="41"
        text-anchor="middle"
        font-family="'VT323', 'Courier New', monospace"
        font-size="18"
        fill="#39ff14"
        filter="url(#glow)">K</text>

  <!-- Left antenna -->
  <line x1="24" y1="18" x2="16" y2="5"
        stroke="#39ff14" stroke-width="2.5" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Right antenna -->
  <line x1="40" y1="18" x2="48" y2="5"
        stroke="#39ff14" stroke-width="2.5" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Left foot -->
  <line x1="20" y1="52" x2="16" y2="60"
        stroke="#39ff14" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right foot -->
  <line x1="44" y1="52" x2="48" y2="60"
        stroke="#39ff14" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Control knobs (right side, readable at 32px+) -->
  <circle cx="56" cy="30" r="2" fill="#39ff14" opacity="0.6"/>
  <circle cx="56" cy="38" r="2" fill="#39ff14" opacity="0.6"/>
</svg>
